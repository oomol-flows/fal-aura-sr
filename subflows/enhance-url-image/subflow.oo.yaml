title: "%url-image-enhancement2%"
description: "%enhances-image-quality-and-clarity-from-a-remote-url-using-ai-po2%"
icon: ":carbon:image-search:"
nodes:

  - node_id: enhance#1
    task: self::enhance-image-clarity
    inputs_from:
      - handle: image_url
        from_flow:
          - input_handle: image_url
        from_node:
          []
  - node_id: query-conversion-result#1
    title: "%query-conversion-result-13%"
    inputs_from:
      - handle: task_id
        from_node:
          - node_id: enhance#1
            output_handle: session_id
      - handle: enable_polling
        value: true
      - handle: max_attempts
        value: 60
      - handle: interval_seconds
        value: 5
    task: self::query-conversion-result
  - node_id: url2file#1
    title: "URL to file #1"
    inputs_from:
      - handle: url
        from_node:
          - node_id: query-conversion-result#1
            output_handle: image_url
      - handle: saved_folder
        value: null
      - handle: ensure_folder
        value: false
      - handle: file_head
        value: null
      - handle: if_existing
        value: override
      - handle: threads_count
        value: 1
      - handle: headers
        value:
          {}
      - handle: cookies
        value:
          {}
      - handle: window_width
        value: 7
      - handle: failure_ladder
        value:
          - 5
      - handle: min_segment_length
        value: 1048576
      - handle: once_fetch_size
        value: 16384
      - handle: timeout
        value: 30
      - handle: retry_times
        value: 0
      - handle: retry_sleep
        value: 0
    subflow: downloader::url2file
inputs_def:
  - handle: image_url
    description: "%the-publicly-accessible-http-https-url-of-the-image-to-enhance-t2%"
    json_schema:
      type: string
      format: uri
    nullable: false
    executor_name: python
outputs_def:
  - handle: file_path
    description: "%the-url-of-the-ai-enhanced-image-with-improved-clarity-and-resol2%"
    json_schema:
      type: string
      ui:widget: file
    nullable: false
    executor_name: python
outputs_from:
  - handle: file_path
    from_node:
      - node_id: url2file#1
        output_handle: file
